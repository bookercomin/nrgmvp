<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Complete</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; line-height: 1.5; }
        code { background: #f3f4f6; padding: 0.2rem 0.4rem; border-radius: 4px; }
        .question-card { margin: 1rem 0; padding: 1rem; border: 1px solid #ddd; border-radius: 8px; }
        textarea { width: 100%; min-height: 80px; margin-top: 0.5rem; padding: 0.5rem; }
        button { margin-top: 1rem; padding: 0.6rem 1rem; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Submission complete</h1>
    <p id="notes-output"></p>
    <div id="questions-container" style="margin-top: 20px;"></div>

    <script>
        const notesOutput = document.getElementById('notes-output');
        const questionsContainer = document.getElementById('questions-container');
        const notes = localStorage.getItem('empNotes') || '';

        notesOutput.textContent = notes || 'No notes submitted.';

        function saveResponses(questions, answers) {
            const data = {
                notes,
                questions,
                answers,
                savedAt: new Date().toISOString()
            };
            localStorage.setItem('questionResponses', JSON.stringify(data));
        }

        function renderQuestionForm(questions) {
            const saved = JSON.parse(localStorage.getItem('questionResponses') || '{}');
            const savedAnswers = saved.answers || [];

            questionsContainer.innerHTML = `
                <h3>Suggested questions</h3>
                <form id="answers-form">
                    ${questions.map((q, index) => `
                        <div class="question-card">
                            <strong>${index + 1}. ${q}</strong>
                            <textarea name="answer-${index}" placeholder="Type your answer here...">${savedAnswers[index] || ''}</textarea>
                        </div>
                    `).join('')}
                    <button type="submit">Save answers</button>
                </form>
            `;

            document.getElementById('answers-form').addEventListener('submit', (event) => {
                event.preventDefault();
                const formData = new FormData(event.target);
                const answers = questions.map((_, index) => formData.get(`answer-${index}`) || '');
                saveResponses(questions, answers);
                alert('Answers saved.');
            });
        }

        async function loadQuestions() {
            if (!notes) {
                questionsContainer.innerHTML = '<p>No notes were available to generate questions.</p>';
                return;
            }

            questionsContainer.innerHTML = '<p>Generating questions...</p>';

            try {
                const response = await fetch('http://localhost:3000/api/generate-questions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ notes })
                });

                const data = await response.json();

                if (!response.ok) {
                    questionsContainer.innerHTML = `<p style="color: #b91c1c;">${data.error || 'Unable to generate questions.'}</p>`;
                    return;
                }

                const questions = Array.isArray(data.questions) ? data.questions : [];
                if (!questions.length) {
                    questionsContainer.innerHTML = '<p>No questions were returned.</p>';
                    return;
                }

                renderQuestionForm(questions);
            } catch (error) {
                questionsContainer.innerHTML = '<p style="color: #b91c1c;">Could not reach the local API server. Make sure it is running on localhost:3000.</p>';
            }
        }

        loadQuestions();
    </script>
</body>
</html>
